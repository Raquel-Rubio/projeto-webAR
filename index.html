<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MVP - Treinamento de RCP (1 Marcador)</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    
    /* Instrução visual no ecrã para guiar o utilizador */
    #instrucao {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(33, 150, 243, 0.9); color: white; padding: 15px 25px;
      border-radius: 8px; text-align: center; font-size: 16px; font-weight: bold;
      z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      pointer-events: none; /* Garante que o toque passe através da caixa de texto */
    }
  </style>

  <script>
    // Componente JavaScript para detetar o toque no ecrã
    AFRAME.registerComponent('iniciar-por-toque', {
      init: function () {
        let socorrista = document.getElementById('socorrista');
        let vitima = document.getElementById('vitima');
        let instrucao = document.getElementById('instrucao');
        let jaIniciou = false;

        // Ouve qualquer toque no ecrã do telemóvel ou clique do rato
        window.addEventListener('click', () => {
          if (!jaIniciou) {
            // Remove o aviso do ecrã
            instrucao.style.display = 'none';
            
            // Inicia as animações atribuindo o nome exato de cada clip
            socorrista.setAttribute('animation-mixer', 'clip: mixamo.com; loop: repeat');
            vitima.setAttribute('animation-mixer', 'clip: 1.; loop: repeat');
            
            jaIniciou = true; // Impede que o código corra novamente se o utilizador clicar várias vezes
          }
        });
      }
    });
  </script>
</head>

<body>
  <div id="instrucao">Toque no ecrã para iniciar a RCP</div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="colorManagement: true;">
    
    <a-light type="ambient" color="#FFF" intensity="0.8"></a-light>
    <a-light type="directional" intensity="0.6" position="-1 2 1"></a-light>
    
    <a-marker preset="hiro" iniciar-por-toque>
      
      <a-entity 
        id="vitima"
        gltf-model="url(vitima.glb)" 
        position="0 0 0" 
        rotation="-90 0 0" 
        scale="1 1 1">
      </a-entity>

      <a-entity 
        id="socorrista"
        gltf-model="url(socorrista.glb)" 
        position="0 0.5 -0.5" 
        rotation="0 0 0" 
        scale="1 1 1">
      </a-entity>

    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
