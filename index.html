<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MVP - Treinamento de RCP</title>
  
  <!-- Bibliotecas do A-Frame e AR.js -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <!-- Biblioteca extra para rodar as animações do Mixamo -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    
    /* Estilo do HUD baseado no seu protótipo de papel */
    #painel {
      position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95); padding: 20px;
      border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 10; width: 80%; max-width: 300px;
    }
    .escondido { display: none; }
    
    #btn-iniciar {
      background-color: #2196F3; color: white; border: none; 
      padding: 12px 20px; font-size: 18px; border-radius: 8px; cursor: pointer;
      font-weight: bold; width: 100%;
    }
    
    #feedback { font-size: 18px; color: #d32f2f; font-weight: bold; }
  </style>

  <script>
    // Componente JavaScript para controlar a interação do usuário
    AFRAME.registerComponent('controle-rcp', {
      init: function () {
        let btn = document.getElementById('btn-iniciar');
        let feedback = document.getElementById('feedback');
        let socorrista = document.getElementById('socorrista');
        let vitima = document.getElementById('vitima');

        // Fica aguardando o usuário clicar no botão "INICIAR RCP"
        btn.addEventListener('click', () => {
          // Esconde o botão e mostra o aviso de ritmo
          btn.classList.add('escondido');
          feedback.classList.remove('escondido');
          feedback.innerText = "Bipes sonoros - 100 BPM\n(Siga o ritmo!)";

          // Ativa a animação dos dois modelos usando a propriedade "clip: *"
          // O "*" faz com que o A-Frame toque a primeira animação que achar no arquivo .glb
          socorrista.setAttribute('animation-mixer', 'clip: *; loop: repeat');
          vitima.setAttribute('animation-mixer', 'clip: *; loop: repeat');
        });
      }
    });
  </script>
</head>

<body>
  <!-- Interface 2D (HUD) -->
  <div id="painel">
    <button id="btn-iniciar">INICIAR RCP</button>
    <div id="feedback" class="escondido"></div>
  </div>

  <!-- Cena de Realidade Aumentada -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="colorManagement: true;">
    
    <a-light type="ambient" color="#FFF" intensity="0.8"></a-light>
    
    <!-- Chamamos o nosso componente 'controle-rcp' aqui no marcador -->
    <a-marker preset="hiro" controle-rcp>
      
      <!-- MODELO 1: Vítima -->
      <!-- Renomeie url() para o nome exato do seu arquivo -->
      <!-- Talvez você precise alterar o 'rotation' para que a vítima fique deitada (-90 0 0) -->
      <a-entity 
        id="vitima"
        gltf-model="url(vitima.glb)" 
        position="0 0 0" 
        rotation="-90 0 0" 
        scale="1 1 1">
      </a-entity>

      <!-- MODELO 2: Socorrista -->
      <!-- Renomeie url() para o nome exato do seu arquivo -->
      <!-- Altere 'position' e 'rotation' aos poucos até que as mãos encaixem no peito da vítima -->
      <a-entity 
        id="socorrista"
        gltf-model="url(socorrista.glb)" 
        position="0 0.5 -0.5" 
        rotation="0 0 0" 
        scale="1 1 1">
      </a-entity>

    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
