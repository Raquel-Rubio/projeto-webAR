<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Teste Simples - Animação Automática</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>
  <a-scene embedded arjs="sourceType: webcam;" renderer="colorManagement: true;">
    
    <a-light type="ambient" color="#FFF" intensity="0.8"></a-light>
    
    <a-marker preset="hiro">
      
      <a-entity 
        gltf-model="url(socorrista.glb)" 
        scale="1 1 1" 
        position="0 0 0" 
        rotation="0 0 0"
        animation-mixer="clip: mixamo.com; loop: repeat">
      </a-entity>

    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
