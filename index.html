<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Assistente de CPR - Realidade Aumentada</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    #hud-container {
      position: fixed;
      bottom: 40px;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 999;
      pointer-events: none; /* Permite interação com o cenário 3D por trás da div */
    }
    
    #btn-cpr {
      pointer-events: auto; /* Reativa o clique apenas no botão */
      padding: 15px 40px;
      font-size: 20px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      color: white;
      background-color: #4CAF50; /* Cor verde padrão (Iniciar) */
      border: none;
      border-radius: 50px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: background-color 0.3s, transform 0.1s;
    }

    #btn-cpr:active {
      transform: scale(0.95); /* Efeito visual de clique */
    }

    #btn-cpr:disabled {
      background-color: #9e9e9e; /* Cor cinza (Desabilitado) */
      cursor: not-allowed;       
      opacity: 0.8;
      transform: none;           
    }
  </style>

<script>
  // Componente para tratamento de transparência e renderização dos materiais 3D
  AFRAME.registerComponent('forca-opaco', {
    init: function () {
      this.el.addEventListener('model-loaded', () => {
        const obj = this.el.getObject3D('mesh');
        if (obj) {
          obj.traverse((node) => {
            if (node.isMesh && node.material) {
              
              // Verifica o nome da malha e do material em letras minúsculas
              const nome = node.name.toLowerCase();
              const nomeMaterial = node.material.name.toLowerCase();

              // Aplica regras de transparência apenas para cabelos e cílios
              if (nome.includes('eyelash') || nome.includes('hair') || nomeMaterial.includes('eyelash') || nomeMaterial.includes('hair')) {
                node.material.transparent = true;
                node.material.depthWrite = false; 
                node.material.alphaTest = 0.05; // Suaviza o recorte da textura
              } else {
                // Força opacidade total para o restante do corpo e roupas
                node.material.transparent = false;
                node.material.depthWrite = true;
              }
            }
          });
        }
      });
    }
  });

  // Componente principal de controle de estado, animações e áudio
  AFRAME.registerComponent('controlador-geral', {
    init: function () {
      // Mapeamento dos elementos da tela e cena
      this.btn = document.getElementById('btn-cpr');
      this.marcador = document.querySelector('a-marker');
      this.modelos = document.querySelectorAll('.dupla-cpr');
      this.audio = new Audio('audio_bip.mp3');
      
      this.rodando = false;
      this.idsTempo = []; // Armazena os identificadores dos temporizadores de áudio

      // Configuração inicial: congela as animações no primeiro carregamento
      this.modelos.forEach(modelo => {
        modelo.addEventListener('model-loaded', () => {
          modelo.setAttribute('animation-mixer', { clip: '*', timeScale: 0, loop: 'repeat' });
        });
      });

      // Evento disparado toda vez que o ciclo da animação reinicia
      this.modelos[0].addEventListener('animation-loop', () => {
        if (this.rodando) {
          this.tocarSequenciaBips();
        }
      });

      // Eventos de rastreamento do marcador AR
      this.marcador.addEventListener('markerFound', () => {
        this.btn.disabled = false; // Habilita o botão
        
        // Atualiza a interface baseada no estado atual
        if (!this.rodando) {
          this.btn.innerText = "Iniciar CPR";
          this.btn.style.backgroundColor = "#4CAF50"; 
        } else {
          this.btn.innerText = "Pausar CPR";
          this.btn.style.backgroundColor = "#f44336"; 
        }
      });

      this.marcador.addEventListener('markerLost', () => {
        this.btn.disabled = true; // Desabilita o botão
        this.btn.innerText = "Procurando marcador...";
        this.btn.style.backgroundColor = ""; 
        
        // Pausa a simulação automaticamente por segurança
        this.pausarCPR(); 
      });

      // Evento de clique no botão principal
      this.btn.onclick = (e) => {
        e.preventDefault(); 
        if (this.rodando) {
          this.pausarCPR();
        } else {
          this.iniciarCPR();
        }
      };
    },

    iniciarCPR: function() {
      if (this.rodando) return; 
      this.rodando = true;

      // Atualiza estado visual do botão para vermelho (Pausar)
      this.btn.innerText = "Pausar CPR";
      this.btn.style.backgroundColor = "#f44336"; 

      // Reinicia e reproduz as animações dos modelos
      this.modelos.forEach(modelo => {
        modelo.setAttribute('animation-mixer', { timeScale: 1, time: 0 });
      });

      this.tocarSequenciaBips();
    },

    pausarCPR: function() {
      if (!this.rodando) return; 
      this.rodando = false;

      // Atualiza estado visual do botão para verde (Iniciar), se o marcador estiver visível
      if (!this.btn.disabled) {
        this.btn.innerText = "Iniciar CPR";
        this.btn.style.backgroundColor = "#4CAF50"; 
      }

      // Congela as animações
      this.modelos.forEach(modelo => {
        modelo.setAttribute('animation-mixer', 'timeScale', 0);
      });

      // Cancela todos os bipes agendados
      this.idsTempo.forEach(id => clearTimeout(id));
      this.idsTempo = [];
    },

    tocarSequenciaBips: function() {
      // Limpa temporizadores anteriores para evitar sobreposição de áudio
      this.idsTempo.forEach(id => clearTimeout(id));
      this.idsTempo = [];

      // Sequência de bipes sincronizada com os keyframes de compressão
      this.tocarBip(); // Bip imediato (Frame 0)
      
      // Agenda os próximos 3 bipes com intervalos de 600ms
      this.idsTempo.push(setTimeout(() => this.tocarBip(), 600));
      this.idsTempo.push(setTimeout(() => this.tocarBip(), 1200));
      this.idsTempo.push(setTimeout(() => this.tocarBip(), 1800));
    },

    tocarBip: function() {
      this.audio.currentTime = 0; // Reinicia o áudio
      this.audio.play().catch(e => console.log("Áudio bloqueado pelo navegador:", e));
    }
  });
</script>
</head>

<body style="margin: 0; overflow: hidden;">
  
  <div id="hud-container">
    <button id="btn-cpr" disabled>Procurando marcador...</button>
  </div>

  <a-scene embedded arjs="sourceType: webcam;" controlador-geral renderer="logarithmicDepthBuffer: true;">
    
    <a-entity camera></a-entity>

    <a-marker preset="hiro" size="0.11">
          
      <a-entity id="socorrista"
                class="dupla-cpr" 
                gltf-model="url(Martha.glb)"
                position="0 0 0"
                scale="9 9 9"
                forca-opaco> 
      </a-entity>

      <a-entity id="paciente"
                class="dupla-cpr"
                gltf-model="url(Sophie.glb)"
                position="-0.054 -0.007 -0.095"
                scale="9 9 9"
                forca-opaco> 
      </a-entity>

    </a-marker>

    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" intensity="0.7" position="-1 2 1"></a-light>

  </a-scene>

</body>
</html>
