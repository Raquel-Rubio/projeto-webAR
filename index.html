<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Assistente de CPR - Realidade Aumentada</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    #hud-container {
      position: fixed;
      bottom: 40px;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 999;
      pointer-events: none; 
    }
    
    #btn-cpr {
      pointer-events: auto; 
      padding: 15px 40px;
      font-size: 20px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      color: white;
      background-color: #4CAF50; 
      border: none;
      border-radius: 50px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: background-color 0.3s, transform 0.1s;
    }

    #btn-cpr:active {
      transform: scale(0.95);
    }

    #btn-cpr:disabled {
      background-color: #9e9e9e; 
      cursor: not-allowed;       
      opacity: 0.8;
      transform: none;           
    }
  </style>

  <script>
  AFRAME.registerComponent('controlador-geral', {
    init: function () {
      this.btn = document.getElementById('btn-cpr');
      this.marcador = document.querySelector('a-marker');
      this.modelos = document.querySelectorAll('.dupla-cpr');
      this.audio = new Audio('audio_bip.mp3');
      
      this.rodando = false;
      this.idTempo = null; // Mudamos a variável para gerenciar setTimeout

      this.modelos.forEach(modelo => {
        modelo.addEventListener('model-loaded', () => {
          modelo.setAttribute('animation-mixer', { clip: 'mixamo.com', timeScale: 0, loop: 'repeat' });
        });
      });

      this.marcador.addEventListener('markerFound', () => {
        this.btn.disabled = false; 
        
        if (!this.rodando) {
          this.btn.innerText = "Iniciar CPR";
          this.btn.style.backgroundColor = "#4CAF50"; 
        } else {
          this.btn.innerText = "Pausar CPR";
          this.btn.style.backgroundColor = "#f44336"; 
        }
      });

      this.marcador.addEventListener('markerLost', () => {
        this.btn.disabled = true; 
        this.btn.innerText = "Procurando marcador...";
        this.btn.style.backgroundColor = ""; 
        
        this.pausarCPR(); 
      });

      // Blindagem 1: Usar .onclick no lugar de addEventListener para matar toques fantasmas duplos do mobile
      this.btn.onclick = (e) => {
        e.preventDefault(); // Impede comportamentos indesejados da tela touch
        
        if (this.rodando) {
          this.pausarCPR();
        } else {
          this.iniciarCPR();
        }
      };
    },

    iniciarCPR: function() {
      if (this.rodando) return; 
      this.rodando = true;

      this.btn.innerText = "Pausar CPR";
      this.btn.style.backgroundColor = "#f44336"; 

      this.modelos.forEach(modelo => {
        modelo.setAttribute('animation-mixer', 'timeScale', 1);
      });

      // Inicia a nova lógica de corrente de áudio
      this.loopDeAudio();
    },

    pausarCPR: function() {
      if (!this.rodando) return; 
      this.rodando = false;

      if (!this.btn.disabled) {
        this.btn.innerText = "Iniciar CPR";
        this.btn.style.backgroundColor = "#4CAF50"; 
      }

      this.modelos.forEach(modelo => {
        modelo.setAttribute('animation-mixer', 'timeScale', 0);
      });

      // Quebra a corrente agendada imediatamente
      if (this.idTempo) {
        clearTimeout(this.idTempo);
        this.idTempo = null;
      }
    },

    // Blindagem 2: Loop em corrente (setTimeout recursivo)
    loopDeAudio: function() {
      // Se tiver sido pausado, a execução morre aqui e o loop termina
      if (!this.rodando) return;

      this.tocarBip();

      // Agenda APENAS O PRÓXIMO bip. Muito mais seguro que setInterval.
      this.idTempo = setTimeout(() => {
        this.loopDeAudio();
      }, 600);
    },

    tocarBip: function() {
      this.audio.currentTime = 0; 
      this.audio.play().catch(e => console.log("Áudio bloqueado:", e));
    }
  });
</script>
</head>

<body style="margin: 0; overflow: hidden;">
  
  <div id="hud-container">
    <button id="btn-cpr" disabled>Procurando marcador...</button>
  </div>

  <a-scene embedded arjs="sourceType: webcam;" controlador-geral>
    
    <a-entity camera></a-entity>

    <a-marker preset="hiro" size="0.11">
          
      <a-entity id="socorrista"
                class="dupla-cpr" 
                gltf-model="url(Martha.glb)"
                position="0 0 0"
                scale="9 9 9"> 
      </a-entity>

      <a-entity id="paciente"
                class="dupla-cpr"
                gltf-model="url(Sophie.glb)"
                position="-0.054 -0.007 -0.095"
                scale="9 9 9"> 
      </a-entity>

    </a-marker>

    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" intensity="0.7" position="-1 2 1"></a-light>

  </a-scene>

</body>
</html>
