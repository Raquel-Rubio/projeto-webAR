<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Assistente de CPR - Realidade Aumentada</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    #hud-container {
      position: fixed;
      bottom: 40px;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 999;
      pointer-events: none; /* Permite que toques fora do botão passem para a cena 3D */
    }
    
    #btn-cpr {
      pointer-events: auto; /* Reativa o clique apenas no botão */
      padding: 15px 40px;
      font-size: 20px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      color: white;
      background-color: #4CAF50; /* Verde inicial */
      border: none;
      border-radius: 50px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: background-color 0.3s, transform 0.1s;
    }

    #btn-cpr:active {
      transform: scale(0.95);
    }

    /* Estilo para quando o botão estiver desabilitado (sem marcador) */
    #btn-cpr:disabled {
      background-color: #9e9e9e; /* Fica cinza */
      cursor: not-allowed;       /* Muda o ícone do mouse no PC */
      opacity: 0.8;
      transform: none;           /* Desativa o efeito de afundar no clique */
    }
  </style>

  <script>
    AFRAME.registerComponent('controlador-geral', {
      init: function () {
        // Mapeamento dos elementos
        this.btn = document.getElementById('btn-cpr');
        this.marcador = document.querySelector('a-marker');
        this.modelos = document.querySelectorAll('.dupla-cpr');
        
        // Instancia o áudio enviado
        this.audio = new Audio('liecio-bip-sound-189733.mp3');
        
        this.rodando = false;
        this.idIntervalo = null;

        // 1. Aguarda os modelos carregarem para congelá-los no frame 0
        this.modelos.forEach(modelo => {
          modelo.addEventListener('model-loaded', () => {
            modelo.setAttribute('animation-mixer', {
              clip: 'mixamo.com',
              timeScale: 0,
              loop: 'repeat'
            });
          });
        });

        // 2. Controla a visibilidade/estado do HUD baseado no rastreamento
        this.marcador.addEventListener('markerFound', () => {
          this.btn.disabled = false; // Habilita o clique
          
          // Se a animação não estiver rodando, exibe o texto para iniciar
          if (!this.rodando) {
            this.btn.innerText = "Iniciar CPR";
            this.btn.style.backgroundColor = "#4CAF50"; // Verde
          }
        });

        this.marcador.addEventListener('markerLost', () => {
          this.btn.disabled = true; // Desabilita o clique
          this.btn.innerText = "Procurando marcador...";
          this.btn.style.backgroundColor = ""; // Remove a cor inline para aplicar o cinza do CSS
          
          // Pausa a animação e o som automaticamente se o usuário desviar a câmera
          if (this.rodando) {
            this.alternarEstado();
          }
        });

        // 3. Lógica principal: Clique no botão do HUD
        this.btn.addEventListener('click', () => {
          this.alternarEstado();
        });
      },

      alternarEstado: function() {
        this.rodando = !this.rodando;

        // Muda o visual e texto do botão
        this.btn.innerText = this.rodando ? "Pausar CPR" : "Iniciar CPR";
        this.btn.style.backgroundColor = this.rodando ? "#f44336" : "#4CAF50"; // Vermelho(Pausa) / Verde(Iniciar)

        // Aplica Play/Pause nas animações
        this.modelos.forEach(modelo => {
          modelo.setAttribute('animation-mixer', 'timeScale', this.rodando ? 1 : 0);
        });

        // Gerencia o áudio de 100 BPM
        if (this.rodando) {
          this.tocarBip(); // Toca o primeiro som imediatamente no clique
          
          // 100 BPM = 60 batidas por minuto = 60000ms / 100 = 600ms
          this.idIntervalo = setInterval(() => {
            this.tocarBip();
          }, 600);
        } else {
          // Para o relógio interno do bip
          clearInterval(this.idIntervalo);
        }
      },

      tocarBip: function() {
        this.audio.currentTime = 0; // Reseta o áudio para não sobrepor se clicar rápido
        this.audio.play().catch(e => console.log("Áudio bloqueado pelo navegador:", e));
      }
    });
  </script>
</head>

<body style="margin: 0; overflow: hidden;">
  
  <div id="hud-container">
    <button id="btn-cpr" disabled>Procurando marcador...</button>
  </div>

  <a-scene embedded arjs="sourceType: webcam;" controlador-geral>
    
    <a-entity camera></a-entity>

    <a-marker preset="hiro" size="0.11">
          
      <a-entity id="socorrista"
                class="dupla-cpr" 
                gltf-model="url(Martha.glb)"
                position="0.054 0.007 0.095"> 
      </a-entity>

      <a-entity id="paciente"
                class="dupla-cpr"
                gltf-model="url(Sophie.glb)"
                position="0.0 0 0"> 
      </a-entity>

    </a-marker>

    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" intensity="0.7" position="-1 2 1"></a-light>

  </a-scene>

</body>
</html>
