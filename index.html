<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Assistente de CPR - Realidade Aumentada</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    #hud-container {
      position: fixed;
      bottom: 40px;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 999;
      pointer-events: none; 
    }
    
    #btn-cpr {
      pointer-events: auto; 
      padding: 15px 40px;
      font-size: 20px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      color: white;
      background-color: #4CAF50; 
      border: none;
      border-radius: 50px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: background-color 0.3s, transform 0.1s;
    }

    #btn-cpr:active {
      transform: scale(0.95);
    }

    #btn-cpr:disabled {
      background-color: #9e9e9e; 
      cursor: not-allowed;       
      opacity: 0.8;
      transform: none;           
    }
  </style>

  <script>
    AFRAME.registerComponent('controlador-geral', {
      init: function () {
        this.btn = document.getElementById('btn-cpr');
        this.marcador = document.querySelector('a-marker');
        this.modelos = document.querySelectorAll('.dupla-cpr');
        this.audio = new Audio('liecio-bip-sound-189733.mp3');
        
        this.rodando = false;
        this.idIntervalo = null;

        this.modelos.forEach(modelo => {
          modelo.addEventListener('model-loaded', () => {
            modelo.setAttribute('animation-mixer', { clip: 'mixamo.com', timeScale: 0, loop: 'repeat' });
          });
        });

        this.marcador.addEventListener('markerFound', () => {
          this.btn.disabled = false; 
          
          if (!this.rodando) {
            this.btn.innerText = "Iniciar CPR";
            this.btn.style.backgroundColor = "#4CAF50"; 
          } else {
            this.btn.innerText = "Pausar CPR";
            this.btn.style.backgroundColor = "#f44336"; 
          }
        });

        this.marcador.addEventListener('markerLost', () => {
          this.btn.disabled = true; 
          this.btn.innerText = "Procurando marcador...";
          this.btn.style.backgroundColor = ""; 
          
          this.pausarCPR(); // Força a pausa absoluta ao perder a referência espacial
        });

        this.btn.addEventListener('click', () => {
          if (this.rodando) {
            this.pausarCPR();
          } else {
            this.iniciarCPR();
          }
        });
      },

      iniciarCPR: function() {
        if (this.rodando) return; // Trava de segurança: impede instanciar se já estiver rodando
        this.rodando = true;

        this.btn.innerText = "Pausar CPR";
        this.btn.style.backgroundColor = "#f44336"; 

        this.modelos.forEach(modelo => {
          modelo.setAttribute('animation-mixer', 'timeScale', 1);
        });

        // Limpeza rigorosa da memória antes de criar o novo relógio
        if (this.idIntervalo) {
          clearInterval(this.idIntervalo);
        }
        
        this.tocarBip(); 
        
        this.idIntervalo = setInterval(() => {
          this.tocarBip();
        }, 600);
      },

      pausarCPR: function() {
        if (!this.rodando) return; // Trava de segurança: não faz nada se já estiver pausado
        this.rodando = false;

        // Se pausou via botão (marcador achado), volta para verde.
        if (!this.btn.disabled) {
          this.btn.innerText = "Iniciar CPR";
          this.btn.style.backgroundColor = "#4CAF50"; 
        }

        this.modelos.forEach(modelo => {
          modelo.setAttribute('animation-mixer', 'timeScale', 0);
        });

        // Mata o relógio e libera o ID garantindo que o áudio pare completamente
        if (this.idIntervalo) {
          clearInterval(this.idIntervalo);
          this.idIntervalo = null;
        }
      },

      tocarBip: function() {
        this.audio.currentTime = 0; 
        this.audio.play().catch(e => console.log("Áudio bloqueado pelo navegador:", e));
      }
    });
  </script>
</head>

<body style="margin: 0; overflow: hidden;">
  
  <div id="hud-container">
    <button id="btn-cpr" disabled>Procurando marcador...</button>
  </div>

  <a-scene embedded arjs="sourceType: webcam;" controlador-geral>
    
    <a-entity camera></a-entity>

    <a-marker preset="hiro" size="0.11">
          
      <a-entity id="socorrista"
                class="dupla-cpr" 
                gltf-model="url(Martha.glb)"
                position="2.054 2.007 0.095"
                scale="10 10 10"> 
      </a-entity>

      <a-entity id="paciente"
                class="dupla-cpr"
                gltf-model="url(Sophie.glb)"
                position="2 2 0"
                scale="10 10 10"> 
      </a-entity>

    </a-marker>

    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" intensity="0.7" position="-1 2 1"></a-light>

  </a-scene>

</body>
</html>
