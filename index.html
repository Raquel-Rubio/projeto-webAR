<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Assistente de CPR - Realidade Aumentada</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <script>
    AFRAME.registerComponent('sincroniza-cpr', {
      schema: {
        // Permite que você defina qual grupo de modelos este script vai controlar
        alvos: { type: 'selectorAll' } 
      },
      init: function () {
        // 1. Congela todos os modelos do grupo no frame 0
        this.data.alvos.forEach(modelo => {
          modelo.setAttribute('animation-mixer', {
            clip: 'mixamo.com',
            timeScale: 0,
            loop: 'repeat'
          });
        });

        // 2. Quando este elemento for clicado...
        this.el.addEventListener('click', () => {
          // Pega o estado atual do primeiro modelo do grupo para saber se está pausado ou rodando
          const primeiroModelo = this.data.alvos[0];
          const mixerAtual = primeiroModelo.getAttribute('animation-mixer');
          
          // Define a nova velocidade: se for 0, muda para 1. Se for 1, muda para 0.
          const novaVelocidade = mixerAtual.timeScale === 0 ? 1 : 0;

          // 3. Aplica o play/pause para ambos os personagens ao mesmo tempo
          this.data.alvos.forEach(modelo => {
            modelo.setAttribute('animation-mixer', 'timeScale', novaVelocidade);
          });
        });
      }
    });
  </script>
</head>

<body style="margin: 0; overflow: hidden;">
  
  <a-scene embedded arjs="sourceType: webcam;">
    
    <a-entity camera 
              cursor="rayOrigin: mouse; fuse: false;" 
              raycaster="objects: .interativo;">
    </a-entity>

    <a-marker preset="hiro">
          
      <a-entity id="socorrista"
                class="interativo dupla-cpr" 
                gltf-model="url(Martha.glb)"
                position="0.054 0.007 0.095" 
                sincroniza-cpr="alvos: .dupla-cpr"> </a-entity>

      <a-entity id="paciente"
                class="interativo dupla-cpr"
                gltf-model="url(Sophie.glb)"
                position="0.0 0 0" 
                sincroniza-cpr="alvos: .dupla-cpr"> </a-entity>

    </a-marker>

    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" intensity="0.7" position="-1 2 1"></a-light>

  </a-scene>
</body>
</html>
